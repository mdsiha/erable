name: 💡 Feature request
description: Suggest an idea or improvement for Erable.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Erable is in a tight 10–12 week
        sprint to launch the MVP, so feature requests will be evaluated
        through the lens of that timeline. Suggestions outside the MVP
        scope are still welcome — they may land in a later phase.

        See [ROADMAP.md](../ROADMAP.md) for the current planned work.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user problem first, before any solution.
      placeholder: As a newcomer, I struggle with...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you solve it? Mockups, sketches, or a clear textual description are all fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried a workaround? Are there other approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my experience
        - Blocking me from using Erable
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Which phase do you think this belongs to?
      description: See ROADMAP.md
      options:
        - Phase 1 — MVP for Ottawa
        - Phase 2 — Premium and scale
        - Phase 3 — B2B and seasonal modules
        - Phase 4 — Beyond
        - Not sure
    validations:
      required: false

  - type: checkboxes
    id: legal
    attributes:
      label: Legal scope
      description: Erable cannot provide immigration advice or services regulated under section 91 of IRPA.
      options:
        - label: This feature does not constitute immigration advice or representation before IRCC.
          required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow the [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
